<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>엔지니어처럼 사고하기</title>
<style>
/* ============================================================
   0. 디자인 토큰 (design.md §6.1 / §6.3) — 하드코딩 색 금지, 전부 변수 참조
   ============================================================ */
:root {
  /* 라이트 (기본) */
  --bg:#F6F7F9; --surface:#FFFFFF; --surface-2:#FBFCFD; --surface-sunken:#EEF1F4;
  --border:#E2E5EA; --border-strong:#CBD1DA;
  --text-1:#191C21; --text-2:#565E6B; --text-3:#8B93A0;
  --primary:#3E63DD; --primary-hover:#3452C0; --primary-active:#2C46A6;
  --primary-fg:#FFFFFF; --primary-subtle:#EAF0FF; --primary-border:#C2D0F7;
  --ok:#2F9E44; --ok-bg:#E8F6EC; --ok-border:#A9DCB8;
  --warn:#C77D11; --warn-bg:#FCF3E4; --warn-border:#F0D49B;
  --danger:#D93B3B; --danger-bg:#FCECEC; --danger-border:#F1B7B7;
  --focus:#3E63DD;
  --shadow-sm:0 1px 2px rgba(16,20,28,.06);
  --shadow-md:0 4px 12px rgba(16,20,28,.08);
  --shadow-lg:0 12px 32px rgba(16,20,28,.14);

  /* 타이포 (design.md §6.2) */
  --font-sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Noto Sans KR",Roboto,"Malgun Gothic",sans-serif;
  --font-mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;

  /* 간격 4px 그리드 */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px;
  --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px; --sp-16:64px;

  /* 반경 */
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-pill:999px;

  /* 모션 */
  --t-fast:120ms; --t-med:180ms; --t-fill:520ms;
  --ease:cubic-bezier(.4,0,.2,1);
}
:root[data-theme="dark"] {
  --bg:#101216; --surface:#191C22; --surface-2:#1F232B; --surface-sunken:#14171C;
  --border:#2A2F39; --border-strong:#3A414E;
  --text-1:#ECEEF2; --text-2:#A4ACB9; --text-3:#6C7581;
  --primary:#6E8AF2; --primary-hover:#8098F5; --primary-active:#5B79EC;
  --primary-fg:#0E1116; --primary-subtle:#1C2740; --primary-border:#33477F;
  --ok:#5BD07A; --ok-bg:#16281C; --ok-border:#2F5A3C;
  --warn:#F0B34D; --warn-bg:#2C2415; --warn-border:#5C4A22;
  --danger:#F16A6A; --danger-bg:#2E1919; --danger-border:#5E3030;
  --focus:#6E8AF2;
  --shadow-sm:0 0 0 1px var(--border);
  --shadow-md:0 0 0 1px var(--border);
  --shadow-lg:0 12px 32px rgba(0,0,0,.5);
}

/* ============================================================
   1. 리셋 & 베이스
   ============================================================ */
*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:var(--font-sans);
  background:var(--bg); color:var(--text-1);
  font-size:15px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
button { font-family:inherit; cursor:pointer; }
:focus-visible { outline:2px solid var(--focus); outline-offset:2px; border-radius:4px; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { transition-duration:0ms !important; animation-duration:0ms !important; }
}

/* ============================================================
   2. 상단바 (design.md §4.0)
   ============================================================ */
.topbar {
  position:sticky; top:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:var(--sp-3);
  padding:0 var(--sp-5);
  background:var(--surface); border-bottom:1px solid var(--border);
}
.topbar.scrolled { box-shadow:var(--shadow-sm); }
.brand { display:flex; align-items:center; gap:var(--sp-2); background:none; border:0; padding:6px; color:var(--text-1); }
.brand .mark { width:16px; height:16px; background:var(--primary); border-radius:3px; transform:rotate(45deg); display:inline-block; }
.brand .title { font-size:15px; font-weight:600; }
.topbar .spacer { flex:1; }
.topbar .overall { display:flex; align-items:center; gap:var(--sp-2); color:var(--text-2); font-size:13px; }
.icon-btn {
  display:inline-flex; align-items:center; justify-content:center;
  width:36px; height:36px; border-radius:var(--r-sm);
  background:transparent; border:1px solid var(--border); color:var(--text-2);
}
.icon-btn:hover { background:var(--surface-2); color:var(--text-1); }

/* ============================================================
   3. 레이아웃 컨테이너
   ============================================================ */
.wrap { margin:0 auto; padding:var(--sp-8) var(--sp-5) var(--sp-16); }
.wrap.wide { max-width:1040px; }
.wrap.narrow { max-width:760px; }
@media (max-width:640px){ .wrap { padding:var(--sp-6) var(--sp-4) var(--sp-12); } }

/* ============================================================
   4. 텍스트 유틸 / 타입 스케일
   ============================================================ */
.h1 { font-size:24px; line-height:32px; font-weight:700; margin:0; }
.h2 { font-size:20px; line-height:28px; font-weight:600; margin:0; }
.h3 { font-size:17px; line-height:24px; font-weight:600; margin:0; }
.lead { font-size:16px; line-height:26px; color:var(--text-2); margin:var(--sp-2) 0 0; }
.label { font-size:12px; line-height:16px; font-weight:600; letter-spacing:.3px; color:var(--text-3); text-transform:none; }
.small { font-size:13px; line-height:20px; color:var(--text-2); }
.mono { font-family:var(--font-mono); font-size:13px; }
.chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--r-pill); font-size:11px; font-weight:600; }
.chip.level { background:var(--surface-sunken); color:var(--text-2); }
.chip.topic { background:var(--primary-subtle); color:var(--primary); }
.chip.diff { gap:5px; }
.chip.diff::before { content:""; width:6px; height:6px; border-radius:50%; }
.chip.diff.low  { background:var(--ok-bg);     color:var(--ok); }
.chip.diff.low::before  { background:var(--ok); }
.chip.diff.mid  { background:var(--warn-bg);   color:var(--warn); }
.chip.diff.mid::before  { background:var(--warn); }
.chip.diff.high { background:var(--danger-bg); color:var(--danger); }
.chip.diff.high::before { background:var(--danger); }

/* ============================================================
   5. 버튼 (design.md §7.1)
   ============================================================ */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:var(--sp-2);
  padding:10px 18px; border-radius:var(--r-sm); font-size:15px; font-weight:600;
  border:1px solid transparent; transition:background var(--t-fast) var(--ease); }
.btn-primary { background:var(--primary); color:var(--primary-fg); }
.btn-primary:hover { background:var(--primary-hover); }
.btn-primary:active { background:var(--primary-active); }
.btn-ghost { background:transparent; border-color:var(--border-strong); color:var(--text-1); }
.btn-ghost:hover { background:var(--surface-2); }
.btn-text { background:none; border:0; color:var(--primary); padding:8px 4px; font-weight:600; }
.btn-text:hover { text-decoration:underline; }
.btn:disabled { opacity:.45; cursor:not-allowed; }

/* ============================================================
   6. 맵 상단 배너 (검증자 관점 리마인더)
   ============================================================ */
.through {
  position:relative; background:var(--primary-subtle);
  border-radius:var(--r-md); padding:var(--sp-4) var(--sp-5) var(--sp-4) var(--sp-6);
  margin:var(--sp-6) 0;
}
.through::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--primary); border-radius:var(--r-md) 0 0 var(--r-md); }
.through .tag { display:inline-block; font-size:11px; font-weight:700; color:var(--primary);
  background:var(--surface); border:1px solid var(--primary-border); border-radius:var(--r-pill);
  padding:2px 10px; margin-bottom:var(--sp-2); }
.through .line { font-size:15px; color:var(--text-1); }
.through .sub { font-size:13px; color:var(--text-2); margin-top:4px; }
.through .dismiss { position:absolute; top:8px; right:8px; }
.through.compact { margin:var(--sp-5) 0 0; background:var(--surface-2); }
.through.compact::before { background:var(--border-strong); }

/* ============================================================
   7. 맵 — 레벨 섹션 & 모듈 카드 (design.md §4.1 / §7.2)
   ============================================================ */
.level-sec { margin-top:var(--sp-10); }
.level-head { display:flex; align-items:center; gap:var(--sp-3); margin-bottom:var(--sp-4); }
.level-head .rule { flex:1; height:1px; background:var(--border); }
.level-head .prog { font-size:13px; color:var(--text-2); white-space:nowrap; }
.mod-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:var(--sp-4); }
.level-sec.through-track .mod-grid { grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
.level-sec.through-track { border:1px dashed var(--border-strong); border-radius:var(--r-lg);
  padding:var(--sp-5); background:var(--surface-2); }

.mod-card { position:relative; text-align:left; width:100%;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md);
  padding:var(--sp-5); display:flex; flex-direction:column; gap:var(--sp-2);
  transition:transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease); }
.mod-card .top { display:flex; align-items:center; gap:var(--sp-2); }
.mod-card .code { font-size:12px; font-weight:600; color:var(--text-3); }
.mod-card .name { font-size:17px; font-weight:600; line-height:24px; }
.mod-card .count { font-size:13px; color:var(--text-3); }
.mod-card .minibar { height:4px; border-radius:var(--r-pill); background:var(--surface-sunken); overflow:hidden; margin-top:var(--sp-2); }
.mod-card .minibar > i { display:block; height:100%; background:var(--primary); border-radius:var(--r-pill);
  transition:width var(--t-fill) var(--ease); }
.mod-card.done .minibar > i { background:var(--ok); }
.mod-card.open:hover, .mod-card.done:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.mod-card.locked { opacity:.6; background:var(--surface-2); cursor:not-allowed; }
.mod-card.locked:hover { box-shadow:none; transform:none; }
.mod-card.shake { animation:shake .15s linear 2; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.mod-card .lock-tip { position:absolute; left:var(--sp-5); right:var(--sp-5); bottom:calc(100% + 6px);
  background:var(--text-1); color:var(--surface); font-size:12px; padding:6px 10px; border-radius:var(--r-sm);
  opacity:0; pointer-events:none; transition:opacity var(--t-fast); z-index:5; }
.mod-card.show-tip .lock-tip { opacity:1; }
.diff-grid { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }
.diff-card .dc-desc { font-size:13px; color:var(--text-2); line-height:20px; margin-top:var(--sp-1); }
.diff-card.low  { border-top:3px solid var(--ok); }
.diff-card.mid  { border-top:3px solid var(--warn); }
.diff-card.high { border-top:3px solid var(--danger); }
.level-title { display:flex; align-items:center; gap:var(--sp-3); margin-top:var(--sp-5); }
.status-ic { width:20px; height:20px; flex:none; }

/* ============================================================
   8. 케이스 목록 (난이도 스트림 · 복습)
   ============================================================ */
.case-list { list-style:none; margin:var(--sp-3) 0 0; padding:0; display:flex; flex-direction:column; gap:var(--sp-2); }
.case-list li button { width:100%; display:flex; align-items:center; gap:var(--sp-3); text-align:left;
  background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:var(--sp-3); color:var(--text-1); font-size:14px; }
.case-list li button:hover { border-color:var(--border-strong); }
.case-list .ct { flex:1; }
.case-list .cs { font-size:12px; color:var(--text-3); }

/* ============================================================
   9. 케이스 플레이 (design.md §4.3)
   ============================================================ */
.case-head { display:flex; flex-direction:column; gap:var(--sp-3); margin-bottom:var(--sp-6); }
.case-head .row { display:flex; align-items:center; justify-content:space-between; gap:var(--sp-3); flex-wrap:wrap; }
.case-head .modname { font-size:14px; color:var(--text-2); font-weight:600; }
/* 2단 케이스 레이아웃 (DataCamp 스타일) — 좌: 읽기 / 우: 풀기 */
.case-2pane { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-6); align-items:start; }
.pane-read, .pane-solve { min-width:0; }
.pane-read { position:sticky; top:72px; }
#solveReveal:not(:empty) { margin-top:var(--sp-4); }
@media (max-width:900px) {
  .case-2pane { grid-template-columns:1fr; gap:var(--sp-5); }
  .pane-read { position:static; }
}
/* 코드로 보기 */
.code-ex .ce-cap { font-size:14px; color:var(--text-2); line-height:22px; margin-bottom:var(--sp-2); }
.code-ex .ce-pre { position:relative; background:var(--surface-sunken); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:var(--sp-4); padding-top:22px; overflow-x:auto;
  font-family:var(--font-mono); font-size:12.5px; line-height:20px; color:var(--text-1); }
.code-ex .ce-pre code { white-space:pre; font-family:inherit; }
.code-ex .ce-lang { position:absolute; top:6px; right:10px; font-size:10px; letter-spacing:.5px;
  text-transform:uppercase; color:var(--text-3); }
.code-ex .ce-verify { display:flex; gap:8px; margin-top:var(--sp-2); font-size:13px; color:var(--text-2);
  background:var(--warn-bg); border:1px solid var(--warn-border); border-radius:var(--r-sm); padding:8px 12px; line-height:20px; }
.code-ex .ce-verify .ce-vlabel { font-weight:700; color:var(--warn); flex:none; }
/* 본문 용어 칩 + 팝오버 */
.term-chips { margin-top:var(--sp-5); }
.term-chips .tc-label { font-size:12px; font-weight:600; color:var(--text-3); margin-bottom:var(--sp-2); }
.term-chips .tc-row { display:flex; flex-wrap:wrap; gap:var(--sp-2); }
.chip.term-chip { cursor:pointer; background:var(--surface-sunken); color:var(--text-2); border:1px solid var(--border); }
.chip.term-chip:hover { border-color:var(--border-strong); color:var(--text-1); }
.term-pop { margin-top:var(--sp-3); background:var(--surface); border:1px solid var(--border);
  border-left:3px solid var(--primary); border-radius:var(--r-sm); padding:var(--sp-3) var(--sp-4); }
.term-pop .tp-term { font-weight:600; font-size:14px; }
.term-pop .tp-def { font-size:13px; color:var(--text-2); line-height:21px; margin-top:4px; }
.term-pop .tp-ex { font-size:13px; color:var(--text-2); line-height:21px; margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
.tp-ex .tp-exlabel, .tt-ex .tt-exlabel { display:inline-block; font-weight:700; color:var(--primary); margin-right:6px; }
.term-pop .tp-more { display:inline-block; margin-top:6px; font-size:12px; color:var(--primary); }
/* 용어 사전 화면 */
.term-list { display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-5); }
.term-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:var(--sp-4) var(--sp-5); }
.term-card .tt-head { display:flex; align-items:baseline; gap:var(--sp-2); flex-wrap:wrap; }
.term-card .tt-term { font-size:16px; font-weight:600; }
.term-card .tt-en { font-size:12px; color:var(--text-3); }
.term-card .tt-def { font-size:14px; color:var(--text-2); line-height:22px; margin-top:4px; }
.term-card .tt-ex { font-size:13px; color:var(--text-2); line-height:21px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
/* 판정 라벨 배지 + 상단바 용어 링크 */
.badge.vlabel { background:var(--surface-sunken); color:var(--text-2); }
.badge.vlabel.warn { background:var(--warn-bg); color:var(--warn); }
.badge.vlabel.danger { background:var(--danger-bg); color:var(--danger); }
.tb-link { background:none; border:0; color:var(--text-2); font-size:13px; font-weight:600; padding:0 8px; cursor:pointer; white-space:nowrap; }
.tb-link:hover { color:var(--text-1); }
@media (max-width:560px){
  .brand .title { display:none; }
  .topbar { gap:var(--sp-2); padding:0 var(--sp-3); }
  .tb-link { padding:0 6px; }
}
/* 해설 게이트 */
.reveal-explain { margin-top:var(--sp-2); }
.explain-slot:empty { display:none; }
.tp-acts { display:flex; gap:var(--sp-4); margin-top:6px; align-items:center; }
/* AI에게 묻기 버튼 */
.ask-btn { margin-top:var(--sp-4); width:100%; justify-content:center; background:var(--surface-2);
  border:1px solid var(--border); color:var(--text-1); }
.ask-btn:hover { border-color:var(--primary); color:var(--primary); }
/* AI 물어보기 패널 */
.ask-scrim { position:fixed; inset:0; background:rgba(0,0,0,.32); z-index:60; opacity:0; transition:opacity var(--t-med); }
.ask-scrim.on { opacity:1; }
.ask-panel { position:fixed; top:0; right:0; bottom:0; width:420px; max-width:94vw; z-index:61;
  background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow-lg);
  transform:translateX(100%); transition:transform var(--t-med) var(--ease); display:flex; flex-direction:column; }
.ask-panel.on { transform:translateX(0); }
.ask-head { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--sp-3);
  padding:var(--sp-5); border-bottom:1px solid var(--border); }
.ask-head .ask-title { font-size:16px; font-weight:600; }
.ask-head .ask-ctx { font-size:12px; color:var(--text-3); margin-top:2px; }
.ask-body { flex:1; overflow:auto; padding:var(--sp-5); }
.ask-note { font-size:12px; color:var(--text-3); background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:8px 12px; line-height:18px; }
.ask-msgs { display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-4); }
.ask-msg { border-radius:var(--r-md); padding:var(--sp-3) var(--sp-4); font-size:14px; line-height:22px; }
.ask-msg.user { align-self:flex-end; background:var(--primary); color:#fff; max-width:85%; }
.ask-msg.bot { align-self:flex-start; background:var(--surface-2); border:1px solid var(--border); max-width:96%; }
.ask-msg.bot .ask-stub { color:var(--text-2); font-size:13px; }
.ask-msg.bot .ask-ground { margin-top:8px; font-size:13px; line-height:21px; }
.ask-ground .ag-label { font-weight:700; color:var(--primary); margin-right:6px; }
.ask-foot { border-top:1px solid var(--border); padding:var(--sp-4) var(--sp-5); }
.ask-sug { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:var(--sp-3); }
.ask-sug .chip { cursor:pointer; background:var(--surface-sunken); color:var(--text-2); border:1px solid var(--border); }
.ask-sug .chip:hover { color:var(--text-1); border-color:var(--border-strong); }
.ask-form { display:flex; gap:var(--sp-2); }
.ask-input { flex:1; padding:10px 12px; border:1px solid var(--border-strong); border-radius:var(--r-sm);
  background:var(--surface); color:var(--text-1); font-size:14px; }
.ask-input:focus { outline:2px solid var(--primary); outline-offset:0; border-color:var(--primary); }
.ask-form .btn { flex:none; }
/* 내 학습 화면 */
.me-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-4); margin-top:var(--sp-5); }
@media (max-width:720px){ .me-grid { grid-template-columns:1fr; } }
.me-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:var(--sp-5); }
.me-card .me-title { font-size:12px; font-weight:600; color:var(--text-3); margin-bottom:var(--sp-3); }
.me-line { display:flex; align-items:center; gap:var(--sp-2); margin-top:var(--sp-2); font-size:14px; color:var(--text-2); }
.me-empty { font-size:13px; color:var(--text-3); }
.me-q { font-size:13px; color:var(--text-2); line-height:20px; margin-top:6px; }
/* 챕터 화면 */
.chap-sec { margin-top:var(--sp-6); }
.chap-level { display:flex; align-items:center; gap:var(--sp-2); font-size:14px; font-weight:600; color:var(--text-2); margin-bottom:var(--sp-3); }
.chap-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:var(--sp-4) var(--sp-5); margin-top:var(--sp-3); }

/* ============================================================

   ============================================================ */

/* ============================================================
   12. 온보딩 (첫 진입 · 다시 보기)

   ============================================================ */

<script>
/* ============================================================

  { id:"observability", term:"관측성", en:"observability", def:"문제가 났는지 로그·모니터링으로 알아채는 능력.", ex:"문의가 들어와야 장애를 안다면 관측성이 부족한 것이다. 로그·모니터링으로 먼저 감지해야 한다." }
];
const TERM_BY_ID = Object.fromEntries(TERMS.map(t => [t.id, t]));

/* ============================================================
   상태 · localStorage (design.md §10)
   ============================================================ */
const LS = { theme:"emg.theme", progress:"emg.progress", dismissed:"emg.dismissed",
  review:"emg.review", onboarded:"emg.onboarded", events:"emg.events" };
let storageOK = true;
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) { storageOK = false; }
}
function probeStorage() {
  try { localStorage.setItem("emg.__probe","1"); localStorage.removeItem("emg.__probe"); storageOK = true; }
  catch (e) { storageOK = false; }
}

let progress  = lsGet(LS.progress, {});
let dismissed = lsGet(LS.dismissed, {});
let review    = lsGet(LS.review, {});   // { "M3-01": true } — 사용자가 복습 표시한 케이스
let events    = lsGet(LS.events, []);   // 학습자 파악 신호: 용어 열람·AI 질문 로그

/* 학습자 파악용 이벤트 기록 (localStorage, 상한 300) */
function logEvent(type, data) {
  events.push(Object.assign({ t:type, ts:Date.now() }, data || {}));
  if (events.length > 300) events = events.slice(-300);
  lsSet(LS.events, events);
}

/* 복습 대상 = 첫 시도 오답(부분 포함) 이거나 사용자가 복습 표시한 케이스 */
function isWrongFirst(id) { return !!(progress[id] && progress[id].attempted && !progress[id].firstCorrect); }
function isFlagged(id)    { return !!review[id]; }
function isReviewTarget(id) { return isWrongFirst(id) || isFlagged(id); }
function reviewCases() { return CASES.filter(c => isReviewTarget(c.id)); }
function toggleReview(id) {
  if (review[id]) delete review[id]; else review[id] = true;
  lsSet(LS.review, review);
}
function overallAccuracy() {
  const att = CASES.filter(c => isAttempted(c.id)).length;
  if (!att) return 0;
  const ok = CASES.filter(c => progress[c.id] && progress[c.id].firstCorrect).length;
  return Math.round(ok / att * 100);
}

/* ============================================================
   파생 계산 (design.md §10.2)
   ============================================================ */
function isAttempted(id) { return !!(progress[id] && progress[id].attempted); }
function overallDone() { return CASES.filter(c => isAttempted(c.id)).length; }

/* 난이도 파생 계산 — 난이도가 최상위 축(모듈은 케이스의 주제 맥락) */
function diffCases(diff) { return CASES.filter(c => c.difficulty === diff); }
function diffAttempted(diff) { return diffCases(diff).filter(c => isAttempted(c.id)).length; }
function diffFirstCorrect(diff) { return diffCases(diff).filter(c => progress[c.id] && progress[c.id].firstCorrect).length; }
function diffAccuracy(diff) { const a = diffAttempted(diff); return a ? Math.round(diffFirstCorrect(diff) / a * 100) : 0; }
function diffComplete(diff) { const cs = diffCases(diff); return cs.length > 0 && cs.every(c => isAttempted(c.id)); }
function allDiffComplete() { return DIFF_ORDER.every(d => diffComplete(d)); }
function firstUnattemptedInDiff(diff) { const cs = diffCases(diff); const n = cs.find(c => !isAttempted(c.id)); return (n || cs[0]).id; }

/* ============================================================

function svgEl(name, attrs) {

  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
const ICON_PATHS = {

  help:    "M8 1.8a6.2 6.2 0 100 12.4A6.2 6.2 0 008 1.8z M6.2 6.2a1.8 1.8 0 013.4.8c0 1.2-1.6 1.4-1.6 2.6 M8 11.6h.01",
  list:    "M6 4.5h8 M6 8h8 M6 11.5h8 M2.7 4.5h.01 M2.7 8h.01 M2.7 11.5h.01",

  target:  "M8 1.8a6.2 6.2 0 100 12.4A6.2 6.2 0 008 1.8z M8 4.6a3.4 3.4 0 100 6.8 3.4 3.4 0 000-6.8z M8 7.2a.8.8 0 100 1.6.8.8 0 000-1.6z",
  bookmark:"M4 2.8h8v10.4l-4-2.6-4 2.6z",

};
function icon(name, size) {
  size = size || 16;
  const svg = svgEl("svg", { width:size, height:size, viewBox:"0 0 16 16", fill:"none",
    stroke:"currentColor", "stroke-width":"1.8", "stroke-linecap":"round", "stroke-linejoin":"round",
    "aria-hidden":"true", focusable:"false" });
  if (name === "lock") {
    svg.appendChild(svgEl("path", { d:"M4.5 7V5.2a3.5 3.5 0 017 0V7" }));
    svg.appendChild(svgEl("rect", { x:"3.5", y:"7", width:"9", height:"6.5", rx:"1.2" }));
  } else {

/* 진행 링(도넛) SVG (design.md §7.3) */
function ring(percent, size, stroke, color) {
  color = color || "var(--primary)";
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(100, percent)) / 100);
  const svg = svgEl("svg", { width:size, height:size, viewBox:`0 0 ${size} ${size}`, "aria-hidden":"true" });
  const bg = svgEl("circle", { cx:size/2, cy:size/2, r, fill:"none", stroke:"var(--surface-sunken)", "stroke-width":stroke });
  const fg = svgEl("circle", { cx:size/2, cy:size/2, r, fill:"none", stroke:color, "stroke-width":stroke,
    "stroke-linecap":"round", "stroke-dasharray":c, "stroke-dashoffset":off,
    transform:`rotate(-90 ${size/2} ${size/2})`, style:"transition:stroke-dashoffset var(--t-fill) var(--ease)" });
  svg.appendChild(bg); svg.appendChild(fg);
  return svg;
}

/* ============================================================
   하이퍼스크립트 헬퍼 — 케이스 텍스트는 textContent 로만 (안전)
   ============================================================ */
function h(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "class") e.className = v;
    else if (k === "text") e.textContent = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "dataset") { for (const d in v) e.dataset[d] = v[d]; }
    else if (v === true) e.setAttribute(k, "");
    else e.setAttribute(k, v);
  }
  if (children != null) {
    (Array.isArray(children) ? children : [children]).forEach(ch => {
      if (ch == null || ch === false) return;
      e.appendChild(typeof ch === "string" || typeof ch === "number" ? document.createTextNode(String(ch)) : ch);
    });
  }
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

/* 케이스 id로 시드한 결정적 셔플 — 정답 위치가 케이스마다 고르게 달라지되, 같은 케이스는 항상 같은 순서 */
function seededShuffle(arr, seedStr) {
  let h = 1779033703 ^ seedStr.length;
  for (let i = 0; i < seedStr.length; i++) { h = Math.imul(h ^ seedStr.charCodeAt(i), 3432918353); h = (h << 13) | (h >>> 19); }
  let s = h >>> 0;
  const rnd = () => { s = (s + 0x6D2B79F5) | 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

/* ============================================================

function renderTopbar() {
  const total = CASES.length, done = overallDone();
  const pct = total ? Math.round(done / total * 100) : 0;
  const op = document.getElementById("overallProg");
  clear(op);
  op.title = `완료 케이스 ${done} / ${total}`;
  op.appendChild(ring(pct, 20, 3));
  op.appendChild(h("span", { text:`진행 ${pct}%` }));

  const ib = document.getElementById("introBtn");
  if (ib && !ib.firstChild) ib.appendChild(icon("help", 18));

  const tb = document.getElementById("themeBtn");
  clear(tb);
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  tb.appendChild(icon(dark ? "sun" : "moon", 18));

}

/* ============================================================
   테마
   ============================================================ */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  lsSet(LS.theme, t);

}
function initTheme() {
  const saved = lsGet(LS.theme, null);

/* ============================================================

function navigate(hash) { if (location.hash === hash) render(); else location.hash = hash; }
function parseHash() {
  const raw = (location.hash || "#/map").replace(/^#/, "");
  const parts = raw.split("/").filter(Boolean); // ["map"] | ["module","M3"] | ["case","M3-01"] | ["result","M3"]
  return { view: parts[0] || "map", arg: parts[1] || null };
}

function renderMap(app) {

  wrap.appendChild(h("p", { class:"lead", text:"검증 판단이 얼마나 미묘한지에 따라 나뉩니다. 하나를 골라 시작하세요." }));

}

const DIFF_DESC = {
  Low:  "검증 지점이 뚜렷한 케이스. 한 번의 되물음으로 닿습니다.",
  Mid:  "그럴듯한 답 뒤에 빠진 경우가 있는 케이스. 한 단계 더 파고듭니다.",
  High: "여러 구조가 얽혀 판단이 다단계로 이어지는 케이스."
};
function diffCard(diff) {
  const d = DIFFICULTY[diff];
  const cs = diffCases(diff);
  const done = diffAttempted(diff);
  const pct = cs.length ? Math.round(done / cs.length * 100) : 0;
  const complete = diffComplete(diff);
  const card = h("button", { class:`mod-card diff-card ${d.cls}${complete ? " done" : " open"}`, type:"button",
    onclick:() => navigate(`#/level/${diff}`) });
  const statusIcon = complete ? ring(100, 24, 3, "var(--ok)") : ring(pct, 24, 3);
  card.appendChild(h("div", { class:"top" }, [ statusIcon, diffBadge(diff) ]));
  card.appendChild(h("div", { class:"name", text:`${diff} 난이도` }));
  card.appendChild(h("div", { class:"dc-desc", text:DIFF_DESC[diff] }));
  card.appendChild(h("div", { class:"count", text:`${cs.length} 케이스${complete ? " · 완료" : done ? ` · ${done} 진행` : ""}` }));
  card.appendChild(h("div", { class:"minibar" }, [ h("i", { style:`width:${pct}%` }) ]));
  return card;
}

/* 난이도 스트림 — 선택한 난이도의 케이스 목록 + 시작 */
function renderLevel(app, diff) {
  if (!DIFFICULTY[diff]) { renderError(app, "난이도를 찾을 수 없습니다."); return; }
  const cs = diffCases(diff);
  const wrap = h("div", { class:"wrap narrow" });
  wrap.appendChild(h("button", { class:"btn btn-text", style:"padding-left:0", onclick:() => navigate("#/map") },
    [ icon("arrowL", 16), h("span", { text:"난이도 선택" }) ]));
  wrap.appendChild(h("div", { class:"level-title" }, [ diffBadge(diff), h("span", { class:"h2", text:`${diff} 난이도` }) ]));
  wrap.appendChild(h("p", { class:"lead", style:"font-size:15px",
    text:`${cs.length}개 케이스. 검증자로서 하나씩 판단하고, 해설로 구조를 이해하세요.` }));

  const ul = h("ul", { class:"case-list" });
  cs.forEach((c, i) => {
    const attempted = isAttempted(c.id);
    const ok = progress[c.id] && progress[c.id].firstCorrect;
    const statusTxt = attempted ? (ok ? "완료" : "복습 권장") : "미시작";
    const mk = h("span", { class:"status-ic", style:"width:18px;height:18px" });
    if (attempted) mk.appendChild(icon(ok ? "check" : "exclaim", 16));
    mk.style.color = attempted ? (ok ? "var(--ok)" : "var(--warn)") : "var(--text-3)";
    const btn = h("button", { type:"button", onclick:() => navigate(`#/case/${c.id}`) }, [
      mk,
      h("span", { class:"ct" }, [
        h("div", { text:`케이스 ${i+1} · ${c.topic}` }),
        h("div", { style:"margin-top:3px;font-size:12px;color:var(--text-3)", text:`${MODULE_BY_ID[c.module].id} ${MODULE_BY_ID[c.module].title}` })
      ]),
      h("span", { class:"cs", text:statusTxt })
    ]);
    ul.appendChild(h("li", {}, [ btn ]));
  });
  wrap.appendChild(ul);

  const complete = diffComplete(diff);
  const label = complete ? "복습 시작" : (diffAttempted(diff) > 0 ? "이어하기" : "시작");
  wrap.appendChild(h("button", { class:"btn btn-primary", style:"width:100%;margin-top:16px",
    onclick:() => navigate(`#/case/${firstUnattemptedInDiff(diff)}`) }, [ h("span", { text:label }), icon("arrowR", 16) ]));
  app.appendChild(wrap);
}

/* ============================================================
   케이스 플레이 (design.md §4.3)
   ============================================================ */
function renderCase(app, caseId) {
  const c = CASES.find(x => x.id === caseId);
  if (!c) { renderError(app, "케이스를 찾을 수 없습니다."); return; }
  const m = MODULE_BY_ID[c.module];
  const cs = diffCases(c.difficulty);
  const idx = cs.findIndex(x => x.id === caseId);
  const already = isAttempted(caseId); // 복습 모드 여부(첫 시도 기록 보존)

  const wrap = h("div", { class:"wrap wide case-wrap" });

  // 진행 헤더 (전폭)
  const head = h("div", { class:"case-head" });
  const seg = h("div", { class:"seg", "aria-hidden":"true" });
  cs.forEach((cc, i) => {
    let cls = ""; if (isAttempted(cc.id)) cls = "done"; if (i === idx) cls = "cur";
    seg.appendChild(h("i", { class:cls }));
  });
  head.appendChild(h("div", { class:"row" }, [
    h("span", { class:"modname", text:`${c.difficulty} 난이도` }),
    h("span", { class:"small", text:`케이스 ${idx+1} / ${cs.length}` })
  ]));
  head.appendChild(seg);
  const tagRow = h("div", { class:"row" }, [ h("span", { class:"chip topic", text:c.topic }), h("span", { class:"chip level", text:`${m.id} ${m.title}` }) ]);
  if (already) tagRow.appendChild(h("span", { class:"review-flag" }, [ icon("check", 14), h("span", { text:"복습 모드 · 점수 미반영" }) ]));
  head.appendChild(tagRow);
  wrap.appendChild(head);

  // 2단 — 좌: 읽기 자료 / 우: 검증 풀이 (DataCamp 스타일)
  const grid = h("div", { class:"case-2pane" });

  const read = h("div", { class:"pane-read" });
  read.appendChild(h("div", { class:"field-label", text:"상황" }));
  read.appendChild(h("div", { class:"card-basic", text:c.scenario }));
  read.appendChild(h("div", { class:"field-label", text:"엔지니어의 답변" }));
  read.appendChild(h("div", { class:"card-quote", text:c.engineer_claim }));
  grid.appendChild(read);

  const solve = h("div", { class:"pane-solve" });
  solve.appendChild(h("div", { class:"q-prompt", text:c.question }));
  const optWrap = h("div", { class:"options", role:"radiogroup", "aria-label":"검증 선택지. 방향키로 이동, Enter로 선택" });
  const optBtns = [];
  seededShuffle(c.options, c.id).forEach((o, i) => {
    const btn = h("button", { type:"button", class:"opt", role:"radio", "aria-checked":"false",
      tabindex: i === 0 ? "0" : "-1" });
    const marker = h("span", { class:"marker", "aria-hidden":"true" });
    const feed = h("span", { class:"ofeed", text:o.feedback });
    const badges = h("span", { class:"badges" });
    btn.appendChild(marker);
    btn.appendChild(h("span", { class:"otext", text:o.text }));
    btn.appendChild(badges);
    btn.appendChild(feed);
    btn.addEventListener("click", () => submitCase(c, o, optBtns, wrap, idx, cs));
    optWrap.appendChild(btn);
    optBtns.push({ btn, opt:o, marker, badges });
  });
  optWrap.addEventListener("keydown", e => onRadioKey(e, optBtns));
  solve.appendChild(optWrap);
  solve.appendChild(h("div", { id:"solveReveal" })); // 판정 배너 위치
  solve.appendChild(askButton(() => askCase(c)));
  grid.appendChild(solve);
  wrap.appendChild(grid);

  // 해설 앵커 (전폭 하단)
  wrap.appendChild(h("div", { id:"revealAnchor" }));

  app.appendChild(wrap);

  // 이미 시도한 케이스면 결과를 즉시 리빌(복습): 저장된 선택 기준
  if (already && progress[caseId].chosen) {
    const chosen = c.options.find(o => o.id === progress[caseId].chosen) || c.options.find(o => o.verdict === "correct");
    revealCase(c, chosen, optBtns, wrap, idx, cs, /*record*/false);
  }
}

/* radiogroup 방향키 이동 (roving tabindex) — 이동만, 제출은 Enter/Space */
function onRadioKey(e, optBtns) {
  const btns = optBtns.map(o => o.btn).filter(b => !b.disabled);
  if (!btns.length) return;
  const cur = btns.indexOf(document.activeElement);
  let next = -1;
  if (e.key === "ArrowDown" || e.key === "ArrowRight") next = (cur + 1 + btns.length) % btns.length;
  else if (e.key === "ArrowUp" || e.key === "ArrowLeft") next = (cur - 1 + btns.length) % btns.length;
  else if (e.key === "Home") next = 0;
  else if (e.key === "End") next = btns.length - 1;
  else return;
  e.preventDefault();
  btns.forEach(b => b.setAttribute("tabindex", "-1"));
  btns[next].setAttribute("tabindex", "0");
  btns[next].focus();
}

function submitCase(c, chosen, optBtns, wrap, idx, cs) {
  const firstTime = !isAttempted(c.id);
  if (firstTime) {
    progress[c.id] = {
      attempted:true,
      firstCorrect: chosen.verdict === "correct",
      chosen: chosen.id,
      ts: Date.now()
    };
    lsSet(LS.progress, progress);
    renderTopbar();
  }
  revealCase(c, chosen, optBtns, wrap, idx, cs, firstTime);
}

function revealCase(c, chosen, optBtns, wrap, idx, cs, recorded) {
  const correctOpt = c.options.find(o => o.verdict === "correct");

  // 선택지 상태 갱신 — 모든 선택지에 판정·이유를 또렷이 표시
  optBtns.forEach(({ btn, opt, marker, badges }) => {
    btn.disabled = true;
    btn.classList.add("revealed");
    btn.setAttribute("aria-checked", opt.id === chosen.id ? "true" : "false");
    clear(marker); clear(badges);
    const isChosen = opt.id === chosen.id;
    const v = VERDICT[opt.verdict];
    if (opt.verdict === "correct") {
      btn.classList.add("rv-correct");
      marker.appendChild(icon("check", 14));
      badges.appendChild(h("span", { class:"badge ans", text:"정답" }));
    } else {
      btn.classList.add(opt.verdict === "partial" ? "rv-partial" : "rv-wrong");
      marker.appendChild(icon(v.icon, 14));
      badges.appendChild(h("span", { class:`badge vlabel ${v.sem}`, text:VERDICT_KO[opt.verdict] }));
    }
    if (isChosen) badges.appendChild(h("span", { class:"badge mine", text:"내 선택" }));
  });

  // 판정 배너 — 우측 풀이 pane 상단
  const solveReveal = wrap.querySelector("#solveReveal");
  if (solveReveal) {
    clear(solveReveal);
    const v = VERDICT[chosen.verdict];
    const banner = h("div", { class:`reveal-banner ${v.sem}`, role:"status", "aria-live":"polite" });
    banner.appendChild(h("div", { class:"rb-head" }, [ icon(v.icon, 18), h("span", { text:v.result }) ]));
    if (chosen.verdict !== "correct") {
      banner.appendChild(h("div", { class:"rb-compare",
        text:`내 선택: ${VERDICT_KO[chosen.verdict]} · 검증된 선택은 따로 있습니다` }));
    }
    banner.appendChild(h("div", { class:"small", style:"margin-top:6px", text:chosen.feedback }));
    solveReveal.appendChild(banner);
  }

  // 해설 — 같은 페이지에서 '해설 보기'를 눌러야 펼쳐짐
  const anchor = wrap.querySelector("#revealAnchor");
  clear(anchor);
  const explainSlot = h("div", { class:"explain-slot" });
  const revealBtn = h("button", { class:"btn btn-primary reveal-explain", type:"button" },
    [ h("span", { text:"해설 보기" }), icon("arrowR", 16) ]);
  revealBtn.addEventListener("click", () => {
    clear(explainSlot);
    explainSlot.appendChild(buildExplain(c));
    revealBtn.remove();
    explainSlot.scrollIntoView({ behavior:"smooth", block:"nearest" });
  });
  anchor.appendChild(revealBtn);
  anchor.appendChild(explainSlot);

  // 내비게이션
  const nav = h("div", { class:"case-nav" });
  nav.appendChild(h("button", { class:"btn btn-text", onclick:() => resetCase(c.id) }, [ icon("arrowL", 16), h("span", { text:"다시 풀기" }) ]));
  const last = idx === cs.length - 1;
  const nextBtn = h("button", { class:"btn btn-primary",
    onclick:() => last ? navigate("#/summary") : navigate(`#/case/${cs[idx+1].id}`) }, [
    h("span", { text: last ? "결과 보기" : "다음 케이스" }), icon("arrowR", 16)
  ]);
  nav.appendChild(nextBtn);
  anchor.appendChild(nav);

  // 복습(이미 푼 케이스) 재방문이면 해설을 바로 펼침
  if (!recorded) revealBtn.click();
}

function resetCase(caseId) {
  // 첫 시도 기록은 유지(점수 보존), 화면만 다시 풀 수 있게 재렌더 — 단 이미 attempted 이므로 복습 모드로 뜸
  // 순수 재도전 UX: 화면을 초기 상태로 다시 그림
  navigate(`#/case/${caseId}`);
  // 강제 재렌더(같은 해시일 때)
  render(true);
}

/* 본문 용어 칩 — 클릭하면 정의 팝오버(한 번에 하나) */
function termChips(ids, caseId) {
  const box = h("div", { class:"term-chips" });
  box.appendChild(h("div", { class:"tc-label", text:"이 케이스의 용어" }));
  const row = h("div", { class:"tc-row" });
  const pop = h("div", { class:"term-pop" }); pop.hidden = true;
  ids.forEach(id => {
    const t = TERM_BY_ID[id]; if (!t) return;
    const chip = h("button", { type:"button", class:"chip term-chip", text:t.term });
    chip.addEventListener("click", () => {
      const isOpen = pop.dataset.for === id && !pop.hidden;
      clear(pop);
      if (isOpen) { pop.hidden = true; pop.dataset.for = ""; return; }
      pop.hidden = false; pop.dataset.for = id;
      logEvent("term_view", { termId:id, caseId });   // 모르는 용어 신호
      pop.appendChild(h("div", { class:"tp-term", text:t.term }));
      pop.appendChild(h("div", { class:"tp-def", text:t.def }));
      if (t.ex) pop.appendChild(h("div", { class:"tp-ex" }, [ h("span", { class:"tp-exlabel", text:"풀이" }), document.createTextNode(t.ex) ]));
      const acts = h("div", { class:"tp-acts" }, [
        h("button", { class:"tp-more", type:"button", onclick:() => askTerm(t), text:"AI에게 물어보기" }),
        h("a", { class:"tp-more", href:"#/terms", text:"용어 전체 보기" })
      ]);
      pop.appendChild(acts);
    });
    row.appendChild(chip);
  });
  box.appendChild(row);
  box.appendChild(pop);
  return box;
}

/* 맥락형 AI 물어보기 패널 (데모 — 실제 AI 연결 지점) */
function openAskPanel(ctx) {
  closeAskPanel();
  const scrim = h("div", { class:"ask-scrim", onclick:closeAskPanel });
  const panel = h("div", { class:"ask-panel", role:"dialog", "aria-modal":"true", "aria-label":"AI에게 묻기" });
  const head = h("div", { class:"ask-head" });
  head.appendChild(h("div", {}, [
    h("div", { class:"ask-title", text:"AI에게 물어보기" }),
    h("div", { class:"ask-ctx", text:ctx.contextLabel })
  ]));
  const closeBtn = h("button", { class:"icon-btn", "aria-label":"닫기", onclick:closeAskPanel });
  closeBtn.appendChild(icon("close", 16));
  head.appendChild(closeBtn);
  panel.appendChild(head);

  const body = h("div", { class:"ask-body" });
  body.appendChild(h("div", { class:"ask-note", text:"모르는 것을 이 화면 맥락에 붙여 물어보세요. 데모 단계라 실제 답변 대신 관련 자료를 보여줍니다." }));
  const msgs = h("div", { class:"ask-msgs" });
  body.appendChild(msgs);
  panel.appendChild(body);

  function send(q) {
    logEvent("ask", Object.assign({ q }, ctx.logData || {}));
    msgs.appendChild(h("div", { class:"ask-msg user", text:q }));
    const a = h("div", { class:"ask-msg bot" });
    a.appendChild(h("div", { class:"ask-stub", text:`실제 서비스에서는 AI가 이 맥락과 당신의 학습 상태를 바탕으로 “${q}”에 답합니다. 지금은 관련 자료를 정리해 드립니다.` }));
    (ctx.grounding || []).forEach(g => a.appendChild(h("div", { class:"ask-ground" }, [
      h("span", { class:"ag-label", text:g.label }), h("span", { text:g.text })
    ])));
    msgs.appendChild(a);
    msgs.scrollTop = msgs.scrollHeight;
  }

  const foot = h("div", { class:"ask-foot" });
  const sug = h("div", { class:"ask-sug" });
  (ctx.suggestions || []).forEach(s => sug.appendChild(h("button", { class:"chip", type:"button", text:s, onclick:() => send(s) })));
  foot.appendChild(sug);
  const form = h("form", { class:"ask-form" });
  const input = h("input", { class:"ask-input", type:"text", placeholder:"질문을 입력하세요", "aria-label":"질문 입력" });
  const sendBtn = h("button", { class:"btn btn-primary", type:"submit", "aria-label":"보내기" });
  sendBtn.appendChild(icon("arrowR", 16));
  form.appendChild(input); form.appendChild(sendBtn);
  form.addEventListener("submit", e => { e.preventDefault(); const v = input.value.trim(); if (v) { send(v); input.value = ""; } });
  foot.appendChild(form);
  panel.appendChild(foot);

  document.body.appendChild(scrim);
  document.body.appendChild(panel);
  requestAnimationFrame(() => { scrim.classList.add("on"); panel.classList.add("on"); });
  document.addEventListener("keydown", askEsc);
  input.focus();
}
function askEsc(e) { if (e.key === "Escape") closeAskPanel(); }
function closeAskPanel() {
  document.removeEventListener("keydown", askEsc);
  document.querySelectorAll(".ask-panel, .ask-scrim").forEach(el => { el.classList.remove("on"); setTimeout(() => el.remove(), 200); });
}
function askCase(c) {
  const m = MODULE_BY_ID[c.module];
  openAskPanel({
    contextLabel: `${m.id} ${m.title} · ${c.topic}`,
    suggestions: ["왜 이게 정답이야?", "구조를 더 쉽게 설명해줘", "실제로 뭘 확인해야 해?"],
    grounding: [
      { label:"개념", text:c.concept },
      { label:"왜 중요", text:c.why },
      c.takeaway ? { label:"검증 액션", text:c.takeaway } : null
    ].filter(Boolean),
    logData: { caseId:c.id }
  });
}
function askTerm(t) {
  openAskPanel({
    contextLabel: `용어 · ${t.term}`,
    suggestions: [`${t.term}, 예시로 설명해줘`, "왜 중요해?"],

function askButton(onclick) {

function buildExplain(c) {
  const box = h("div", { class:"explain" });

  // 검증 액션 takeaway — "그래서 실제로 무엇을 확인·질문해야 하나" (매 케이스 각인)
  if (c.takeaway) {

    tk.appendChild(ic);
    tk.appendChild(h("div", {}, [
      h("div", { class:"tk-label", text:"검증 액션" }),
      h("div", { class:"tk-text", text:c.takeaway })
    ]));
    box.appendChild(tk);
  }

  box.appendChild(h("div", { class:"field-label", text:"개념" }));
  const def = h("div", { class:"def-card" });
  def.appendChild(h("div", { class:"def", text:c.concept }));
  def.appendChild(h("div", { class:"why-label", text:"중요한 이유" }));
  def.appendChild(h("div", { class:"why", text:c.why }));
  box.appendChild(def);

  box.appendChild(h("div", { class:"field-label", text:"구조로 보기" }));
  box.appendChild(structureBlock(c));

  // 코드로 보기 — 읽기용 스니펫 (해설 흐름에 포함)
  if (c.code_example) {
    box.appendChild(h("div", { class:"field-label", text:"코드로 보기" }));

  }

  // 이 케이스의 용어

  // 복습 표시 토글
  const rt = h("button", { class:"btn btn-text review-toggle", style:"margin-top:8px" });
  const paint = () => {
    clear(rt);

    rt.classList.toggle("on", on);
    rt.appendChild(icon(on ? "check" : "bookmark", 15));
    rt.appendChild(h("span", { text: on ? "복습 목록에 추가됨 · 해제" : "복습 목록에 추가" }));
    rt.setAttribute("aria-pressed", on ? "true" : "false");
  };
  rt.addEventListener("click", () => { toggleReview(c.id); paint(); });
  paint();
  box.appendChild(rt);
  return box;
}

/* ============================================================
   구조 도식 (design.md §7.7) — 케이스별 diagram 데이터에서 SVG 생성
   케이스마다 관여 컴포넌트(레인)·흐름(엣지)·검증 포인트(highlight)가 달라
   서로 다른 그림이 렌더된다. structure_note 원문은 그대로 하단에 함께 표시.
   ============================================================ */
const DIAG = { W:660, laneH:108, labelW:104, padX:16, nodeH:40, nodeGap:14, nodeMaxW:150 };
/* 엣지 종류별 선 스타일 (색은 의미색 규칙 준수 — 검증 포인트만 warn) */
const EDGE_STYLE = {
  req:     { color:"var(--primary)",       width:1.7, dash:null,   marker:"arrPrimary" },
  res:     { color:"var(--text-3)",        width:1.4, dash:"4 4",  marker:"arrGray" },
  flow:    { color:"var(--border-strong)", width:1.5, dash:null,   marker:"arrNeutral" },
  blocked: { color:"var(--danger)",        width:1.6, dash:"5 4",  marker:"arrDanger" },
  check:   { color:"var(--warn)",          width:2.2, dash:"5 4",  marker:"arrWarn" }
};
const ARROWS = [
  ["arrPrimary","var(--primary)"], ["arrGray","var(--text-3)"], ["arrNeutral","var(--border-strong)"],
  ["arrDanger","var(--danger)"], ["arrWarn","var(--warn)"]
];

/* 라벨을 노드 폭에 맞춰 최대 2줄로 접기 (SVG는 자동 줄바꿈 없음) */
function wrapLabel(text, maxChars) {
  if (text.length <= maxChars) return [text];
  const seps = [" ", "·", "→"];
  let cut = -1;
  for (let i = Math.min(maxChars, text.length - 1); i >= 2; i--) {
    if (seps.includes(text[i])) { cut = i; break; }
  }
  if (cut === -1) cut = maxChars;
  const first = text.slice(0, text[cut] === " " ? cut : cut + 1).trim();
  let rest = text.slice(text[cut] === " " ? cut + 1 : cut + 1).trim();
  if (rest.length > maxChars) rest = rest.slice(0, maxChars - 1) + "…";
  return [first, rest];
}

function structureBlock(c) {
  const wrap = h("div", { class:"diagram-wrap" });
  wrap.appendChild(c.diagram ? renderDiagram(c.diagram) : h("div", { class:"struct-note", text:"구조 도식 준비 중" }));
  // 검증 포인트 설명 (도식 highlight 를 텍스트로 — 접근성·명료성)
  if (c.diagram && c.diagram.check && c.diagram.check.note) {
    const cn = h("div", { class:"check-note" }, [
      h("span", { class:"cn-badge", text:"?" }),
      h("div", {}, [ h("span", { class:"cn-tag", text:"검증 포인트  " }), document.createTextNode(c.diagram.check.note) ])
    ]);
    wrap.appendChild(cn);
  }
  const note = h("div", { class:"struct-note" });
  note.appendChild(h("b", { text:"이 케이스의 구조   " }));
  note.appendChild(document.createTextNode(c.structure_note));
  wrap.appendChild(note);
  return wrap;
}

/* 도식 aria 요약 (시각 대체 텍스트) */
function diagramAria(dg) {
  const lanes = dg.lanes.map(l => l.label).join(" · ");
  const flow = dg.edges.filter(e => e.label).map(e => e.label).join(", ");
  const chk = dg.check && dg.check.note ? ` 검증 포인트: ${dg.check.note}` : "";
  return `구성요소: ${lanes}. 흐름: ${flow}.${chk}`;
}

function pathEl(d, st) {
  const p = svgEl("path", { d, fill:"none", stroke:st.color, "stroke-width":st.width, "marker-end":`url(#${st.marker})` });
  if (st.dash) p.setAttribute("stroke-dasharray", st.dash);
  return p;
}
function renderDiagram(dg) {
  const { W, laneH, labelW, padX, nodeH, nodeGap, nodeMaxW } = DIAG;
  const H = dg.lanes.length * laneH;
  const svg = svgEl("svg", { viewBox:`0 0 ${W} ${H}`, role:"img", "aria-label":diagramAria(dg) });

  // defs: 화살촉
  const defs = svgEl("defs");
  ARROWS.forEach(([id, color]) => {
    const m = svgEl("marker", { id, viewBox:"0 0 10 10", refX:"8", refY:"5",
      markerWidth:"7", markerHeight:"7", orient:"auto" });
    m.appendChild(svgEl("path", { d:"M0 0 L10 5 L0 10 z", fill:color }));
    defs.appendChild(m);
  });
  svg.appendChild(defs);

  // 레인 배경 + 라벨
  const laneIndex = {};
  dg.lanes.forEach((ln, i) => {
    laneIndex[ln.id] = i;
    const y = i * laneH;
    svg.appendChild(svgEl("rect", { x:0, y, width:W, height:laneH, fill: i % 2 ? "var(--surface-2)" : "var(--surface)" }));
    if (i > 0) svg.appendChild(svgEl("line", { x1:0, y1:y, x2:W, y2:y, stroke:"var(--border)", "stroke-width":"1" }));
    // 라벨 컬럼: 종류 점 + 텍스트(최대 2줄)
    svg.appendChild(svgEl("circle", { cx:16, cy:y + laneH/2, r:4,
      fill: ln.kind === "external" ? "var(--surface)" : "var(--primary)",
      stroke: ln.kind === "external" ? "var(--text-3)" : "none", "stroke-width":"1.4",
      opacity: ln.kind === "external" ? "1" : ".55" }));
    const lines = wrapLabel(ln.label, 9);
    lines.forEach((tx, li) => {
      const t = svgEl("text", { x:28, y:y + laneH/2 + (lines.length === 1 ? 4 : (li === 0 ? -3 : 13)),
        fill:"var(--text-3)", "font-size":"11.5", "font-weight":"600" });
      t.textContent = tx; svg.appendChild(t);
    });
  });

  // 노드 배치
  const pos = {};
  const byLane = {};
  dg.nodes.forEach(n => { (byLane[n.lane] = byLane[n.lane] || []).push(n); });
  dg.lanes.forEach(ln => {
    const arr = byLane[ln.id] || [];
    const k = arr.length; if (!k) return;
    const areaX0 = labelW + padX, areaX1 = W - padX, areaW = areaX1 - areaX0;
    const nodeW = Math.min(nodeMaxW, (areaW - (k - 1) * nodeGap) / k);
    const totalW = k * nodeW + (k - 1) * nodeGap;
    const startX = areaX0 + (areaW - totalW) / 2;
    const cy = laneIndex[ln.id] * laneH + laneH / 2;
    arr.forEach((n, j) => {
      const cx = startX + nodeW / 2 + j * (nodeW + nodeGap);
      pos[n.id] = { cx, cy, w:nodeW, h:nodeH, lane:laneIndex[ln.id], kind:ln.kind };
    });
  });

  // 엣지 먼저 (노드 아래 깔리도록) — 레인쌍별 stagger
  const groups = {};
  dg.edges.forEach(e => {
    const a = pos[e.from], b = pos[e.to]; if (!a || !b) return;
    const key = a.lane === b.lane ? `S${a.lane}` : `${Math.min(a.lane,b.lane)}-${Math.max(a.lane,b.lane)}`;
    (groups[key] = groups[key] || []).push(e);
  });
  const groupSeen = {};
  dg.edges.forEach(e => {
    const a = pos[e.from], b = pos[e.to]; if (!a || !b) return;
    const isCheck = dg.check && dg.check.on === "edge" && dg.check.ref === `${e.from}>${e.to}`;
    const st = isCheck ? EDGE_STYLE.check : (EDGE_STYLE[e.kind] || EDGE_STYLE.flow);
    const key = a.lane === b.lane ? `S${a.lane}` : `${Math.min(a.lane,b.lane)}-${Math.max(a.lane,b.lane)}`;
    const g = groups[key]; const gi = (groupSeen[key] = (groupSeen[key] == null ? 0 : groupSeen[key] + 1));
    const stag = (gi - (g.length - 1) / 2);

    let labelX, labelY;
    if (a.lane === b.lane) {
      // 같은 레인 → 위로 아치 (상태전이·관계)
      const y0 = a.cy - a.h / 2;
      const ctrlY = y0 - 26 - Math.abs(stag) * 12;
      const midX = (a.cx + b.cx) / 2;
      const p = svgEl("path", { d:`M${a.cx} ${y0} Q ${midX} ${ctrlY} ${b.cx} ${y0}`,
        fill:"none", stroke:st.color, "stroke-width":st.width, "marker-end":`url(#${st.marker})` });
      if (st.dash) p.setAttribute("stroke-dasharray", st.dash);
      svg.appendChild(p);
      labelX = midX; labelY = ctrlY + 8;
    } else {
      const down = b.lane > a.lane;
      const sy = a.cy + (down ? a.h / 2 : -a.h / 2);
      const ty = b.cy + (down ? -b.h / 2 : b.h / 2);
      const sameCol = Math.abs(a.cx - b.cx) < 1;
      if (sameCol) {
        // 같은 세로줄 — 양방향이면 좌우로 충분히 벌려 라벨·화살표 겹침 방지
        const xoff = g.length > 1 ? stag * 96 : 0;
        const x = a.cx + xoff;
        svg.appendChild(pathEl(`M${x} ${sy} L${x} ${ty}`, st));
        labelX = x; labelY = (sy + ty) / 2 + 4;
      } else {
        const my = (sy + ty) / 2 + stag * 14;
        svg.appendChild(pathEl(`M${a.cx} ${sy} L${a.cx} ${my} L${b.cx} ${my} L${b.cx} ${ty}`, st));
        labelX = (a.cx + b.cx) / 2; labelY = my - 5;
      }
    }

    // 엣지 라벨 (배경 rect + 텍스트) + 검증 배지는 라벨 옆으로
    if (e.label) {
      labelX = Math.max(labelW + 6, Math.min(W - 8, labelX));
      const approxW = e.label.length * 6.4 + 8;
      svg.appendChild(svgEl("rect", { x:labelX - approxW / 2, y:labelY - 11, width:approxW, height:15, rx:3,
        fill:"var(--surface)", opacity:".92" }));
      const t = svgEl("text", { x:labelX, y:labelY, "text-anchor":"middle", "font-size":"10.5",
        fill: isCheck ? "var(--warn)" : st.color, "font-weight": isCheck ? "700" : "500" });
      t.textContent = e.label; svg.appendChild(t);
      if (isCheck) drawCheckBadge(svg, Math.min(W - 12, labelX + approxW / 2 + 12), labelY - 4);
    } else if (isCheck) {
      drawCheckBadge(svg, labelX, labelY);
    }
  });

  // 노드 렌더 (엣지 위)
  dg.nodes.forEach(n => {
    const p = pos[n.id]; if (!p) return;
    const isCheck = dg.check && dg.check.on === "node" && dg.check.ref === n.id;
    const bx = p.cx - p.w / 2, by = p.cy - p.h / 2;
    const rect = svgEl("rect", { x:bx, y:by, width:p.w, height:p.h, rx:6,
      fill: p.kind === "ai" ? "var(--primary-subtle)" : "var(--surface)",
      stroke: isCheck ? "var(--warn)" : "var(--border-strong)", "stroke-width": isCheck ? "2" : "1" });
    if (p.kind === "external") rect.setAttribute("stroke-dasharray", "4 3"); // 통제 밖 표시
    svg.appendChild(rect);
    const maxCh = Math.max(5, Math.floor(p.w / 12));
    const lines = wrapLabel(n.label, maxCh);
    lines.forEach((tx, li) => {
      const t = svgEl("text", { x:p.cx, y:p.cy + (lines.length === 1 ? 4 : (li === 0 ? -3 : 13)),
        "text-anchor":"middle", "font-size":"11.5", fill:"var(--text-1)" });
      t.textContent = tx; svg.appendChild(t);
    });
    if (isCheck) drawCheckBadge(svg, bx + p.w, by);
  });

  return svg;
}

function drawCheckBadge(svg, cx, cy) {
  svg.appendChild(svgEl("circle", { cx, cy, r:9, fill:"var(--warn-bg)", stroke:"var(--warn)", "stroke-width":"1.6" }));
  const t = svgEl("text", { x:cx, y:cy + 4, "text-anchor":"middle", "font-size":"12", "font-weight":"700", fill:"var(--warn)" });
  t.textContent = "?"; svg.appendChild(t);
}

function renderReview(app) {
  const wrap = h("div", { class:"wrap narrow" });

  const wrongs = CASES.filter(c => isWrongFirst(c.id));
  const flagged = CASES.filter(c => isFlagged(c.id) && !isWrongFirst(c.id));

  if (!wrongs.length && !flagged.length) {
    const es = h("div", { class:"empty-state" });
    const ic = h("span", { class:"es-ic" }); ic.appendChild(icon("check", 26));
    es.appendChild(ic);
    es.appendChild(h("div", { class:"es-title", text:"모아둔 케이스가 없습니다" }));
    es.appendChild(h("div", { class:"es-sub", text:"첫 시도에서 틀린 케이스는 자동으로, 해설에서 복습 표시한 케이스는 수동으로 여기에 모입니다." }));
    es.appendChild(h("button", { class:"btn btn-primary", style:"margin-top:16px", onclick:() => navigate("#/map"), text:"맵으로" }));
    wrap.appendChild(es);
    app.appendChild(wrap);

  }

  const listBlock = (title, arr) => {
    if (!arr.length) return;
    wrap.appendChild(h("div", { class:"review-group-label", text:`${title} · ${arr.length}` }));
    arr.forEach(c => {
      const chosenOpt = c.options.find(o => o.id === (progress[c.id] && progress[c.id].chosen));
      const ic = h("span", { class:"status-ic", style:`color:${isWrongFirst(c.id) ? "var(--danger)" : "var(--primary)"}` });
      ic.appendChild(icon(isWrongFirst(c.id) ? "cross" : "bookmark", 16));
      const sub = isWrongFirst(c.id)
        ? `${c.module} · 내 선택: ${chosenOpt ? VERDICT_KO[chosenOpt.verdict] : "-"} · 검증된 선택 다시 보기`
        : `${c.module} · 복습 표시함`;
      wrap.appendChild(h("button", { class:"missed-item", style: isWrongFirst(c.id) ? null : "border-color:var(--primary-border)",
        onclick:() => navigate(`#/case/${c.id}`) }, [
        ic,
        h("div", { class:"mi-body" }, [
          h("div", { text:`${c.topic}` }),
          h("div", { class:"mi-cmp", text:sub })
        ])
      ]));
    });
  };
  listBlock("첫 시도 오답", wrongs);
  listBlock("복습 표시", flagged);

  const actions = h("div", { class:"result-actions", style:"justify-content:flex-start" });
  actions.appendChild(h("button", { class:"btn btn-ghost", onclick:() => navigate("#/map") }, [ icon("arrowL", 16), h("span", { text:"맵으로" }) ]));
  const first = (wrongs[0] || flagged[0]);
  if (first) actions.appendChild(h("button", { class:"btn btn-primary", onclick:() => navigate(`#/case/${first.id}`) }, [ h("span", { text:"첫 케이스부터 다시 풀기" }), icon("arrowR", 16) ]));
  wrap.appendChild(actions);
  app.appendChild(wrap);
}

/* ============================================================
   최종 수료 대시보드 (전 모듈 완료 시)
   ============================================================ */
function renderSummary(app) {
  const wrap = h("div", { class:"wrap narrow result" });
  const complete = allDiffComplete();
  wrap.appendChild(h("h2", { class:"h2", text: complete ? "전 과정 수료" : "수료 현황" }));

  const acc = overallAccuracy();
  const ringWrap = h("div", { class:"big-ring" });
  ringWrap.appendChild(ring(acc, 96, 8));
  ringWrap.appendChild(h("span", { class:"ring-num", text:`${acc}%` }));
  wrap.appendChild(ringWrap);
  wrap.appendChild(h("div", { class:"acc-label", text:"종합 검증 정확도 (첫 시도 기준)" }));

  const attempted = CASES.filter(c => isAttempted(c.id)).length;
  const correct = CASES.filter(c => progress[c.id] && progress[c.id].firstCorrect).length;
  const doneDiffs = DIFF_ORDER.filter(d => diffComplete(d)).length;
  wrap.appendChild(h("div", { class:"summary" }, [
    h("div", { class:"cell" }, [ h("div", { class:"num", text:`${doneDiffs} / 3` }), h("div", { class:"cap", text:"완료 난이도" }) ]),
    h("div", { class:"cell" }, [ h("div", { class:"num", text:`${correct} / ${attempted}` }), h("div", { class:"cap", text:"검증된 선택(첫 시도)" }) ]),
    h("div", { class:"cell" }, [ h("div", { class:"num", text:String(reviewCases().length) }), h("div", { class:"cap", text:"복습 대상" }) ])
  ]));

  if (!complete) {
    wrap.appendChild(h("div", { class:"unlock-note", style:"background:var(--surface-2)",
      text:`아직 남은 난이도가 있습니다 (완료 ${doneDiffs}/3). 세 난이도를 모두 마치면 수료로 표시됩니다.` }));
  }

  // 약한 난이도 추천 복습 (시도했으나 100% 미만)
  const weak = DIFF_ORDER
    .filter(d => diffAttempted(d) > 0 && diffAccuracy(d) < 100)
    .sort((a, b) => diffAccuracy(a) - diffAccuracy(b));
  if (weak.length) {
    const wl = h("div", { class:"weak-list" });
    wl.appendChild(h("h3", { class:"h3", text:"약한 난이도 · 복습 추천" }));
    weak.forEach(d => {
      const ic = h("span", { class:"status-ic", style:"color:var(--warn)" }); ic.appendChild(icon("target", 16));
      wl.appendChild(h("button", { class:"weak-item", onclick:() => navigate(`#/level/${d}`) }, [
        ic,
        h("div", { class:"wi-body" }, [
          h("div", { text:`${d} 난이도` }),
          h("div", { class:"mi-cmp", style:"font-size:12px;color:var(--text-2)", text:`검증 정확도 ${diffAccuracy(d)}% · 다시 풀기` })
        ]),
        h("span", { class:"wi-acc", text:`${diffAccuracy(d)}%` })
      ]));
    });
    wrap.appendChild(wl);
  } else if (complete) {
    wrap.appendChild(h("div", { class:"unlock-note", text:"세 난이도를 모두 첫 시도에서 검증해냈습니다. 검증자의 눈이 자리 잡았습니다." }));
  }

  // 난이도별 검증 정확도
  const recap = h("div", { class:"recap" });
  recap.appendChild(h("h3", { class:"h3", text:"난이도별 검증 정확도" }));
  recap.appendChild(h("p", { class:"small", style:"margin-top:0", text:"어려운 판단일수록 검증 감각이 드러납니다. 첫 시도 기준입니다." }));
  DIFF_ORDER.forEach(dk => {
    const cases = CASES.filter(c => c.difficulty === dk);
    const att = cases.filter(c => isAttempted(c.id)).length;
    const ok  = cases.filter(c => progress[c.id] && progress[c.id].firstCorrect).length;
    const pct = att ? Math.round(ok / att * 100) : 0;
    recap.appendChild(h("div", { class:"rc-line" }, [
      diffBadge(dk),
      h("span", { text: att ? `${pct}% · ${ok}/${att} 검증` : `아직 안 풂 · ${cases.length}문항` })
    ]));
  });
  wrap.appendChild(recap);

  const actions = h("div", { class:"result-actions" });
  actions.appendChild(h("button", { class:"btn btn-ghost", onclick:() => navigate("#/map") }, [ icon("arrowL", 16), h("span", { text:"맵으로" }) ]));
  if (reviewCases().length) actions.appendChild(h("button", { class:"btn btn-primary", onclick:() => navigate("#/review") }, [ h("span", { text:"복습 모아보기" }), icon("arrowR", 16) ]));
  wrap.appendChild(actions);
  app.appendChild(wrap);
}

/* ============================================================
   학습자 파악(프로필) — 이벤트/진행에서 파생, AI 컨텍스트는 마크다운으로 투영
   ============================================================ */
function buildLearnerProfile() {
  const attempted = CASES.filter(c => isAttempted(c.id)).length;
  const diffStats = DIFF_ORDER.map(d => ({ d, att:diffAttempted(d), ok:diffFirstCorrect(d), acc:diffAccuracy(d), total:diffCases(d).length }));
  const wrongs = CASES.filter(c => isWrongFirst(c.id));
  const byTopic = {};
  wrongs.forEach(c => { byTopic[c.module] = (byTopic[c.module] || 0) + 1; });
  const weakTopics = Object.entries(byTopic).sort((a,b) => b[1]-a[1])
    .map(([m,n]) => ({ m, title:MODULE_BY_ID[m].title, n }));
  const tv = {};
  events.filter(e => e.t === "term_view").forEach(e => { tv[e.termId] = (tv[e.termId] || 0) + 1; });
  const unknownTerms = Object.entries(tv).sort((a,b) => b[1]-a[1])
    .map(([id,n]) => ({ id, term:(TERM_BY_ID[id] || {}).term || id, n }));
  const questions = events.filter(e => e.t === "ask").map(e => ({ q:e.q, caseId:e.caseId, termId:e.termId }));
  return { attempted, total:CASES.length, diffStats, weakTopics, unknownTerms, questions };
}
function buildLearnerMarkdown(p) {
  const L = ["# 학습자 프로필", "", `- 진행: ${p.attempted}/${p.total} 케이스 시도`, "", "## 난이도별 검증 정확도 (첫 시도)"];
  p.diffStats.forEach(s => L.push(`- ${s.d}: ${s.att ? `${s.acc}% (${s.ok}/${s.att})` : "미시작"} · 총 ${s.total}`));
  L.push("", "## 약한 주제");
  if (p.weakTopics.length) p.weakTopics.forEach(w => L.push(`- ${w.m} ${w.title}: 첫 시도 오답 ${w.n}`));
  else L.push("- 아직 데이터 없음");
  L.push("", "## 헷갈린 용어 (정의를 열어본 것)");
  if (p.unknownTerms.length) p.unknownTerms.forEach(t => L.push(`- ${t.term}${t.n > 1 ? ` (${t.n}회)` : ""}`));
  else L.push("- 없음");
  L.push("", "## AI에게 물어본 것");
  if (p.questions.length) p.questions.forEach(q => L.push(`- "${q.q}"${q.caseId ? ` (${q.caseId})` : q.termId ? ` (용어)` : ""}`));
  else L.push("- 없음");
  return L.join("\n");
}
function renderMe(app) {
  const p = buildLearnerProfile();
  const wrap = h("div", { class:"wrap narrow" });
  wrap.appendChild(h("button", { class:"btn btn-text", style:"padding-left:0",
    onclick:() => { if (history.length > 1) history.back(); else navigate("#/map"); } },
    [ icon("arrowL", 16), h("span", { text:"뒤로" }) ]));
  wrap.appendChild(h("h2", { class:"h2", text:"내 학습" }));
  wrap.appendChild(h("p", { class:"lead", style:"font-size:15px",
    text:"당신의 검증 감각을 시스템이 어떻게 파악하는지 보여줍니다. 이 요약이 AI 튜터·맞춤 케이스 생성의 입력이 됩니다." }));

  const grid = h("div", { class:"me-grid" });
  // 난이도별
  const c1 = meCard("난이도별 검증 정확도");
  p.diffStats.forEach(s => c1.appendChild(h("div", { class:"me-line" }, [
    diffBadge(s.d), h("span", { text: s.att ? `${s.acc}% · ${s.ok}/${s.att}` : `미시작 · ${s.total}문항` })
  ])));
  grid.appendChild(c1);
  // 약한 주제
  const c2 = meCard("약한 주제");
  if (p.weakTopics.length) p.weakTopics.forEach(w => c2.appendChild(h("div", { class:"me-line" },
    [ h("span", { class:"chip level", text:w.m }), h("span", { text:`${w.title} · 첫 시도 오답 ${w.n}` }) ])));
  else c2.appendChild(h("div", { class:"me-empty", text:"아직 오답 데이터가 없습니다." }));
  grid.appendChild(c2);
  // 헷갈린 용어
  const c3 = meCard("헷갈린 용어");
  if (p.unknownTerms.length) { const r = h("div", { class:"tc-row" }); p.unknownTerms.forEach(t => r.appendChild(h("span", { class:"chip", text:t.term }))); c3.appendChild(r); }
  else c3.appendChild(h("div", { class:"me-empty", text:"용어 정의를 연 기록이 없습니다." }));
  grid.appendChild(c3);
  // 질문 로그
  const c4 = meCard("AI에게 물어본 것");
  if (p.questions.length) p.questions.slice(-8).reverse().forEach(q => c4.appendChild(h("div", { class:"me-q", text:`“${q.q}”` })));
  else c4.appendChild(h("div", { class:"me-empty", text:"아직 물어본 질문이 없습니다." }));
  grid.appendChild(c4);
  wrap.appendChild(grid);

  // AI가 읽는 마크다운 프로필
  const md = buildLearnerMarkdown(p);
  wrap.appendChild(h("div", { class:"field-label", style:"margin-top:24px", text:"AI가 보는 내 프로필 (마크다운)" }));
  const pre = h("pre", { class:"ce-pre", style:"padding-top:16px" }, [ h("code", { text:md }) ]);
  wrap.appendChild(pre);
  const copyBtn = h("button", { class:"btn btn-text", style:"padding-left:0",
    onclick:() => { try { navigator.clipboard && navigator.clipboard.writeText(md); } catch (e) {} } },
    [ icon("list", 15), h("span", { text:"마크다운 복사" }) ]);
  wrap.appendChild(copyBtn);
  app.appendChild(wrap);
}
function meCard(title) {
  const card = h("div", { class:"me-card" });
  card.appendChild(h("div", { class:"me-title", text:title }));
  return card;
}

/* ============================================================
   챕터 — 무엇을 배우나 (주제 영역별 학습 목표·소재)
   ============================================================ */
const LEVEL_NAME = { L1:"토대", L2:"핵심", L3:"심화", L4:"신뢰성·설계", L0:"관통" };
const LEVEL_ORDER = ["L1", "L2", "L3", "L4", "L0"];
function renderChapters(app) {
  const wrap = h("div", { class:"wrap narrow" });
  wrap.appendChild(h("button", { class:"btn btn-text", style:"padding-left:0",
    onclick:() => { if (history.length > 1) history.back(); else navigate("#/map"); } },
    [ icon("arrowL", 16), h("span", { text:"뒤로" }) ]));
  wrap.appendChild(h("h2", { class:"h2", text:"목차" }));
  wrap.appendChild(h("p", { class:"lead", style:"font-size:15px",
    text:"챕터별 케이스 전체입니다. 아무 케이스나 눌러 바로 풀 수 있습니다." }));
  LEVEL_ORDER.forEach(lv => {
    const mods = MODULES.filter(m => m.level === lv);
    if (!mods.length) return;
    const sec = h("div", { class:"chap-sec" });
    sec.appendChild(h("div", { class:"chap-level" }, [ h("span", { class:"chip level", text:lv }), h("span", { text:LEVEL_NAME[lv] }) ]));
    mods.forEach(m => {
      const cs = CASES.filter(c => c.module === m.id)
        .sort((a, b) => (DIFF_ORDER.indexOf(a.difficulty) - DIFF_ORDER.indexOf(b.difficulty)) || a.id.localeCompare(b.id));
      const card = h("div", { class:"chap-card" });
      card.appendChild(h("div", { class:"chap-head" }, [
        h("span", { class:"chap-id", text:m.id }),
        h("span", { class:"chap-title", text:m.title }),
        h("span", { class:"chap-meta", style:"margin-left:auto", text:`${cs.length}` })
      ]));
      card.appendChild(h("div", { class:"chap-sum", text:m.summary }));
      const ul = h("ul", { class:"toc-list" });
      cs.forEach((c, i) => {
        const attempted = isAttempted(c.id);
        const ok = progress[c.id] && progress[c.id].firstCorrect;
        const kids = [
          h("span", { class:"toc-num", text:`${i + 1}` }),
          h("span", { class:"toc-topic", text:c.topic }),
          diffBadge(c.difficulty)
        ];
        if (attempted) {
          const st = h("span", { class:"toc-st" }); st.appendChild(icon(ok ? "check" : "exclaim", 13));
          st.style.color = ok ? "var(--ok)" : "var(--warn)";
          kids.push(st);
        }
        ul.appendChild(h("li", {}, [ h("button", { type:"button", onclick:() => navigate(`#/case/${c.id}`) }, kids) ]));
      });
      card.appendChild(ul);
      sec.appendChild(card);
    });
    wrap.appendChild(sec);
  });
  app.appendChild(wrap);
}

function renderError(app, msg) {
  const wrap = h("div", { class:"wrap narrow" });
  const card = h("div", { class:"card-basic", style:"text-align:center" });
  card.appendChild(h("div", { class:"h3", text:"문제가 발생했습니다" }));
  card.appendChild(h("p", { class:"small", text:msg }));
  card.appendChild(h("button", { class:"btn btn-primary", style:"margin-top:12px", onclick:() => navigate("#/map"), text:"맵으로" }));
  wrap.appendChild(card);
  app.appendChild(wrap);
}

/* ============================================================
   라우터 렌더
   ============================================================ */
function render(force) {
  const app = document.getElementById("app");
  clear(app);
  const { view, arg } = parseHash();
  window.scrollTo(0, 0);
  try {
    if (view === "intro") renderIntro(app);
    else if (view === "map") renderMap(app);
    else if (view === "level") renderLevel(app, arg);
    else if (view === "case") renderCase(app, arg);
    else if (view === "review") renderReview(app);
    else if (view === "summary") renderSummary(app);
    else if (view === "terms") renderTerms(app);
    else if (view === "me") renderMe(app);
    else if (view === "chapters") renderChapters(app);
    else renderMap(app);
  } catch (e) {
    renderError(app, "화면을 그리는 중 오류가 발생했습니다. 새로고침 해주세요.");
    console.error(e);
  }
  if (app.firstChild && app.firstChild.classList) app.firstChild.classList.add("view-fade");
  renderTopbar();
}

/* ============================================================
   초기화
   ============================================================ */
function init() {
  probeStorage();
  initTheme();
  if (!storageOK) {
    const pb = document.getElementById("privacy-banner");
    pb.className = "banner-thin";
    pb.textContent = "진행 상황이 저장되지 않습니다 (브라우저 저장소 접근 불가).";
  }
  document.getElementById("brandBtn").addEventListener("click", () => navigate("#/map"));
  document.getElementById("introBtn").addEventListener("click", () => navigate("#/intro"));
  document.getElementById("termsBtn").addEventListener("click", () => navigate("#/terms"));
  document.getElementById("meBtn").addEventListener("click", () => navigate("#/me"));
  document.getElementById("chaptersBtn").addEventListener("click", () => navigate("#/chapters"));
  document.getElementById("themeBtn").addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur === "dark" ? "light" : "dark");
  });
  window.addEventListener("scroll", () => {
    document.getElementById("topbar").classList.toggle("scrolled", window.scrollY > 4);
  }, { passive:true });
  window.addEventListener("hashchange", () => render());
  // 첫 방문이면 온보딩으로, 아니면 맵 (localStorage 로 판단)
  const onboarded = lsGet(LS.onboarded, false);
  if (!location.hash || location.hash === "#/" ) location.hash = onboarded ? "#/map" : "#/intro";
  render();
}
document.addEventListener("DOMContentLoaded", init);
</script>
